---
layout: default
---

<div class="page-grid">
  <aside class="sidebar">
    <img class="sidebar__photo" src="{{ '/assets/profile4.jpg' | relative_url }}" alt="{{ site.title }}">
    <h1 class="sidebar__name">{{ site.title }}</h1>
    <p class="sidebar__title">
      Associate Research Fellow<br>
      National Assembly Futures Institute (NAFI)
    </p>
    <div class="sidebar__tags">
      <span class="tag">Health Economics</span>
      <span class="tag">Population Economics</span>
    </div>

    <div class="sidebar__contact">
      <a class="contact-link" href="mailto:inhyuk@nafi.re.kr">
        <span class="contact-label">Email</span>
        <span class="contact-value">inhyuk@nafi.re.kr</span>
      </a>
      <a class="contact-link" href="{{ '/assets/InhyukHwang_CV.pdf' | relative_url }}" download>
        <span class="contact-label">CV</span>
        <span class="contact-value">Download</span>
      </a>
      <a class="contact-link" href="{{ '/' | relative_url }}">
        <span class="contact-label">Home</span>
        <span class="contact-value">Back ←</span>
      </a>
    </div>
  </aside>

  <main class="content research-content">
    {% if page.title %}
    <div class="section">
      <h2>{{ page.title }}</h2>
    </div>
    {% endif %}
    {{ content }}
  </main>

<script>
(function() {
  function addPdfDates() {
    var repo = 'inhyuk-hwang/inhyuk-hwang.github.io';
    var pdfLinks = document.querySelectorAll('a[href$=".pdf"]');
    
    pdfLinks.forEach(function(link) {
      var href = link.getAttribute('href');
      if (!href.includes('assets')) return;
      var filePath = 'assets' + href.split('assets')[1];
      
      if (link.textContent.trim() !== '[PDF]') return;
      
      fetch('https://api.github.com/repos/' + repo + '/commits?path=' + filePath + '&per_page=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data.length > 0) {
            var date = new Date(data[0].commit.committer.date);
            var formatted = date.toISOString().slice(0, 10);
            var span = document.createElement('span');
            span.style.cssText = 'font-size:0.85em; color:#888; margin-left:6px;';
            span.textContent = '(Updated: ' + formatted + ')';
            link.parentNode.insertBefore(span, link.nextSibling);
          }
        })
        .catch(function() {});
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', addPdfDates);
  } else {
    addPdfDates();
  }
})();
</script>
</div>
